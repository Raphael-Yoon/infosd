{% extends 'base.html' %}
{% block title %}문의하기 — 정보보호공시 시스템{% endblock %}
{% block content %}

<div class="text-center animate-fade-in pb-4" style="padding-top: 80px;">
    <a href="{{ url_for('login.login_page') }}">
        <img src="{{ url_for('static', filename='images/logos/logo.png') }}"
             alt="정보보호공시 시스템 로고"
             class="logo-img"
             style="max-width: 480px; width: 100%; height: auto;">
    </a>
</div>

<div class="mx-auto animate-fade-in" style="max-width: 520px;">
    <div class="progress-card p-5 shadow-sm">

        {% if success %}
        <!-- 전송 완료 -->
        <div class="text-center py-3">
            <div class="mb-3" style="font-size: 2.5rem; color: var(--bs-success);">
                <i class="fas fa-check-circle"></i>
            </div>
            <h5 class="fw-bold mb-2">문의가 접수되었습니다</h5>
            <p class="text-muted small mb-4">빠른 시일 내에 확인 후 연락드리겠습니다.</p>
            <a href="{{ url_for('login.login_page') }}" class="btn btn-outline-secondary rounded-pill px-4 small fw-bold">
                <i class="fas fa-arrow-left me-1"></i>로그인 페이지로
            </a>
        </div>

        {% else %}
        <!-- 문의 폼 -->
        <h5 class="fw-bold mb-1 text-center">문의하기</h5>
        <p class="text-muted small text-center mb-4">시스템 이용 문의 또는 계정 신청을 남겨주세요.</p>

        {% if error %}
        <div class="alert alert-danger rounded-3 small py-2 px-3 mb-3">
            <i class="fas fa-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <form method="post" action="{{ url_for('login.contact') }}">
            <input type="hidden" name="form_token" value="{{ form_token }}">
            <!-- Honeypot -->
            <input type="text" name="website" style="display:none;" tabindex="-1" autocomplete="off">

            <div class="mb-3">
                <label class="form-label fw-bold text-muted small">이름 <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control rounded-3 border"
                       placeholder="홍길동" required value="{{ name or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold text-muted small">소속/회사</label>
                <input type="text" name="company_name" class="form-control rounded-3 border"
                       placeholder="(주)한국정보" value="{{ company_name or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold text-muted small">이메일 <span class="text-danger">*</span></label>
                <input type="email" name="email" class="form-control rounded-3 border"
                       placeholder="example@company.com" required value="{{ email or '' }}">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold text-muted small">문의내용 <span class="text-danger">*</span></label>
                <textarea name="message" class="form-control rounded-3 border"
                          rows="4" placeholder="문의 내용을 입력해 주세요." required>{{ message or '' }}</textarea>
            </div>
            <button type="submit" class="btn-premium-action w-100">
                <i class="fas fa-paper-plane me-2"></i>문의 보내기
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="{{ url_for('login.login_page') }}" class="text-muted small text-decoration-none me-3">
                <i class="fas fa-arrow-left me-1"></i>로그인
            </a>
            <a href="{{ url_for('login.tour') }}" class="text-muted small text-decoration-none">
                <i class="fas fa-compass me-1"></i>기능 둘러보기
            </a>
        </div>
        {% endif %}

    </div>
</div>

{% endblock %}
