<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — 정보보호공시 시스템</title>
    <link rel="stylesheet" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        (function() {
            const t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-main); }
        .login-card { width: 100%; max-width: 420px; background: var(--bg-surface); border-radius: var(--card-radius); box-shadow: var(--shadow-main); padding: 2.5rem 2rem; }
        .login-logo { font-size: 1.5rem; font-weight: 700; color: var(--primary-color); letter-spacing: -0.5px; }
        .login-sub  { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem; }
        .form-control { background: var(--input-bg); color: var(--text-main); border-color: var(--border-color); }
        .form-control:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
        .btn-login { background: var(--accent-gradient); border: none; color: #fff; font-weight: 600; padding: .65rem 0; border-radius: 8px; width: 100%; }
        .btn-login:hover { opacity: .9; color: #fff; }
        .alert-error { background: var(--color-error-light); color: var(--color-error-dark); border: none; border-radius: 8px; padding: .75rem 1rem; font-size: .875rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="mb-4 text-center">
            <div class="login-logo"><i class="fas fa-shield-alt me-2"></i>정보보호공시</div>
            <div class="login-sub">Information Security Disclosure System</div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert-error mb-3"><i class="fas fa-exclamation-circle me-2"></i>{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}" autocomplete="on">
            <div class="mb-3">
                <label class="form-label fw-semibold" style="color:var(--text-main)">아이디</label>
                <input type="text" name="username" class="form-control" autocomplete="username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold" style="color:var(--text-main)">비밀번호</label>
                <input type="password" name="password" class="form-control" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>로그인
            </button>
        </form>
    </div>
</body>
</html>
